<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Pay - Community Financial Credit Union</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Community Financial Credit Union</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">← Back to Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-content">
            <h1>Bill Pay</h1>
            <div id="billMessage" class="message-box"></div>
            <div class="form-group">
                <label>Biller Name</label>
                <input type="text" id="billerName" placeholder="Utility company">
            </div>
            <div class="form-group">
                <label>Amount (USD)</label>
                <input type="number" id="billAmount" placeholder="0.00" min="0.01" step="0.01">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="billDueDate">
            </div>
            <button class="btn btn-primary" id="billSubmit">Pay Bill</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            requireLogin();
        });

        document.getElementById('billSubmit').addEventListener('click', function() {
            const name = document.getElementById('billerName').value.trim();
            const amount = parseFloat(document.getElementById('billAmount').value);
            const due = document.getElementById('billDueDate').value;
            const msgBox = document.getElementById('billMessage');

            if (!name || !amount || amount <= 0 || !due) {
                showMessage('Please fill in all required fields', 'error', msgBox);
                return;
            }

            const user = JSON.parse(localStorage.getItem('currentUser'));
            const checking = user.accounts?.checking;
            if (!checking || checking.balance < amount) {
                showMessage('Insufficient funds', 'error', msgBox);
                return;
            }

            checking.balance -= amount;
            checking.transactions.push({
                type: 'debit',
                amount: amount,
                description: `Bill payment to ${name}`,
                timestamp: new Date().toISOString(),
                accountType: 'checking'
            });

            updateCurrentUser(user);
            showMessage('Bill paid successfully! ✅', 'success', msgBox);
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
