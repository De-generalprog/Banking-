<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Pay - Community Financial Credit Union</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Community Financial Credit Union</div>
            <ul class="nav-links">
                <li><a href="dashboard.html">← Back to Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-content">
            <h1>Pay Bills & Services</h1>
            <div id="billMessage" class="message-box"></div>
            
            <!-- Bill Type Selection -->
            <div class="form-group">
                <label>Select Bill Type</label>
                <select id="billType" onchange="updateBillForm()">
                    <option value="">Choose a service...</option>
                    <option value="giftcard">🎁 Gift Card</option>
                    <option value="electricity">⚡ Electricity</option>
                    <option value="phone">📱 Phone Bill</option>
                    <option value="internet">🌐 Internet</option>
                    <option value="transport">🚌 Transport</option>
                    <option value="train">🚂 Train Ticket</option>
                    <option value="bus">🚌 Bus Ticket</option>
                    <option value="other">📄 Other Bill</option>
                </select>
            </div>
            
            <div id="billForm" style="display: none;">
                <div class="form-group">
                    <label id="billerLabel">Biller Name</label>
                    <input type="text" id="billerName" placeholder="Enter biller name">
                </div>
                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" id="billAmount" placeholder="0.00" min="0.01" step="0.01">
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="billDueDate">
                </div>
                <button class="btn btn-primary" id="billSubmit">Pay Bill</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            requireLogin();
        });

        function updateBillForm() {
            const billType = document.getElementById('billType').value;
            const billForm = document.getElementById('billForm');
            const billerLabel = document.getElementById('billerLabel');
            const billerInput = document.getElementById('billerName');
            
            if (billType) {
                billForm.style.display = 'block';
                switch(billType) {
                    case 'giftcard':
                        billerLabel.textContent = 'Gift Card Type';
                        billerInput.placeholder = 'e.g., Amazon, iTunes, Starbucks';
                        break;
                    case 'electricity':
                        billerLabel.textContent = 'Utility Company';
                        billerInput.placeholder = 'e.g., ConEd, PG&E';
                        break;
                    case 'phone':
                        billerLabel.textContent = 'Phone Provider';
                        billerInput.placeholder = 'e.g., Verizon, AT&T';
                        break;
                    case 'internet':
                        billerLabel.textContent = 'Internet Provider';
                        billerInput.placeholder = 'e.g., Comcast, Spectrum';
                        break;
                    case 'transport':
                        billerLabel.textContent = 'Transport Service';
                        billerInput.placeholder = 'e.g., MTA, Uber';
                        break;
                    case 'train':
                        billerLabel.textContent = 'Train Service';
                        billerInput.placeholder = 'e.g., Amtrak, NJ Transit';
                        break;
                    case 'bus':
                        billerLabel.textContent = 'Bus Service';
                        billerInput.placeholder = 'e.g., Greyhound, Local Transit';
                        break;
                    default:
                        billerLabel.textContent = 'Biller Name';
                        billerInput.placeholder = 'Enter biller name';
                }
            } else {
                billForm.style.display = 'none';
            }
        }

        document.getElementById('billSubmit').addEventListener('click', function() {
            const billType = document.getElementById('billType').value;
            const name = document.getElementById('billerName').value.trim();
            const amount = parseFloat(document.getElementById('billAmount').value);
            const due = document.getElementById('billDueDate').value;
            const msgBox = document.getElementById('billMessage');

            if (!billType || !name || !amount || amount <= 0 || !due) {
                showMessage('Please fill in all required fields', 'error', msgBox);
                return;
            }

            const user = JSON.parse(localStorage.getItem('currentUser'));
            const checking = user.accounts?.checking;
            if (!checking || checking.balance < amount) {
                showMessage('Insufficient funds', 'error', msgBox);
                return;
            }

            checking.balance -= amount;
            checking.transactions.push({
                type: 'debit',
                amount: amount,
                description: `Payment to ${name} (${billType})`,
                timestamp: new Date().toISOString(),
                accountType: 'checking'
            });

            updateCurrentUser(user);
            showMessage('Payment processed successfully! ✅', 'success', msgBox);
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
