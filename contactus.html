<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - SecureBank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contact-container">
        <div class="contact-card">
            <div class="contact-header">
                <a href="index.html" class="back-link">← Back</a>
                <a href="AI.html" class="next-link">AI Assistant ←</a>
                <h1>Contact Us</h1>
            </div>

            <div class="contact-content">
                <h2>We're Here to Help</h2>
                <p>If you have any questions, concerns, or need assistance, please don't hesitate to reach out to us. Our customer support team is available 24/7 to assist you with any banking needs.</p>
         <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here..." maxlength="100" required></textarea>
                </div>
                <button class="btn btn-primary btn-full">Send Message</button>
            </form> 
           
    <script src="app.js"></script>
</body>
</html>
