<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureBank</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- reCAPTCHA v3 Script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="back-link">← Back</a>
                <h1>SecureBank</h1>
            </div>

            <div class="login-content">
                <h2>Login to Your Account</h2>

                <!-- Email/Password Login -->
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password" 
                            required
                        >
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <!-- Hidden reCAPTCHA Token -->
                    <input type="hidden" id="recaptchaToken" name="recaptchaToken" value="">

                    <!-- reCAPTCHA Badge Disclaimer -->
                    <p class="recaptcha-disclaimer">
                        This site is protected by reCAPTCHA and the Google 
                        <a href="https://policies.google.com/privacy">Privacy Policy</a> and 
                        <a href="https://policies.google.com/terms">Terms of Service</a> apply.
                    </p>

                    <button type="submit" class="btn btn-primary btn-full">Login</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>Or login with</span>
                </div>

                <!-- Social Login Options -->
                <div class="social-login">
                    <!-- Google Login -->
                    <div id="g_id_onload"
                         data-client_id="YOUR_GOOGLE_CLIENT_ID"
                         data-callback="handleGoogleLogin">
                    </div>
                    <div class="g_id_signin" data-type="standard"></div>

                    <!-- Apple Login -->
                    <button type="button" class="btn btn-social btn-apple" onclick="handleAppleLogin()">
                        <span>🍎 Apple</span>
                    </button>

                    <!-- Microsoft Login -->
                    <button type="button" class="btn btn-social btn-microsoft" onclick="handleMicrosoftLogin()">
                        <span>Microsoft</span>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="login-footer">
                    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                </div>

                <!-- Message Display -->
                <div id="messageBox" class="message-box"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
