<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SecureBank</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- reCAPTCHA v3 Script -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <a href="index.html" class="back-link">← Back</a>
                <h1>SecureBank</h1>
            </div>

            <div class="signup-content">
                <h2>Create Your Account</h2>
                <p class="subtitle">Join SecureBank and manage your finances securely</p>

                <!-- Email/Password Sign Up -->
                <form id="signupForm" class="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input 
                                type="text" 
                                id="firstName" 
                                name="firstName" 
                                placeholder="John" 
                                required
                            >
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input 
                                type="text" 
                                id="lastName" 
                                name="lastName" 
                                placeholder="Doe" 
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="+1 (555) 123-4567" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <input 
                            type="number" 
                            id="age" 
                            name="age" 
                            placeholder="18" 
                            min="18"
                            max="120"
                            required
                        >
                        <small>Must be at least 18 years old</small>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Create a strong password" 
                            required
                        >
                        <small>Must be at least 8 characters with uppercase, lowercase, and numbers</small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            placeholder="Confirm your password" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="checkbox">
                            <input type="checkbox" name="terms" required>
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>Or sign up with</span>
                </div>

                <!-- Social Sign Up Options -->
                <div class="social-login">
                    <!-- Google Sign Up -->
                    <div id="g_id_onload"
                         data-client_id="YOUR_GOOGLE_CLIENT_ID"
                         data-callback="handleGoogleSignUp">
                    </div>
                    <div class="g_id_signin" data-type="standard"></div>

                    <!-- Apple Sign Up -->
                    <button type="button" class="btn btn-social btn-apple" onclick="handleAppleSignUp()">
                        <span>🍎 Apple</span>
                    </button>

                    <!-- Microsoft Sign Up -->
                    <button type="button" class="btn btn-social btn-microsoft" onclick="handleMicrosoftSignUp()">
                        <span>Microsoft</span>
                    </button>
                </div>

                <!-- Login Link -->
                <div class="signup-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>

                <!-- Message Display -->
                <div id="messageBox" class="message-box"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
